<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="dashboard-bg">
<nav>
  <div class="nav-left">
    <a href="/home">Home</a>
    <a href="/features">Features</a>
    <a href="/about">About</a>
  </div>

  <div class="nav-right">
    <a href="/logout">Logout</a>
  </div>
</nav>

<div class="container">

  <h2>👋 Welcome, {{ user }}</h2>

  <p>You have access to explore amazing destinations!</p>

  <h3>Total Destinations: {{ count }}</h3>

  <div class="features-cards">

    <div class="card">
      <h3>🌍 Explore</h3>
      <p>Check all destinations</p>
    </div>

    <div class="card">
      <h3>🔍 Search</h3>
      <p>Find your favorite place</p>
    </div>

    <div class="card">
      <h3>💡 Suggestions</h3>
      <p>Get travel ideas</p>
    </div>

  </div>

</div>

</body>
</html>
